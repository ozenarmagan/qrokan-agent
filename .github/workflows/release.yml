name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run dist:win
        env:
          ELECTRON_BUILDER_PUBLISH: never

      - name: Generate latest.yml
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $exe = Get-ChildItem -Path out -Filter "*.exe" -Recurse | Select-Object -First 1
          Write-Host "Found exe: $($exe.FullName)"
          $file = $exe.Name
          $bytes = [System.IO.File]::ReadAllBytes($exe.FullName)
          $sha = [System.Security.Cryptography.SHA512]::Create().ComputeHash($bytes)
          $sha512 = [Convert]::ToBase64String($sha)
          $size = $exe.Length
          $date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ss.fffZ")
          @"
          version: $version
          files:
            - url: $file
              sha512: $sha512
              size: $size
          path: $file
          sha512: $sha512
          releaseDate: '$date'
          "@ | Set-Content out\latest.yml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            out/**/*.exe
            out/**/*.yml

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run dist:mac
        env:
          ELECTRON_BUILDER_PUBLISH: never

      - name: Generate latest-mac.yml
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Files in out/:"
          ls out/
          ARM_FILE=$(ls out/ | grep "arm64.dmg" | head -1)
          X64_FILE=$(ls out/ | grep -v arm64 | grep ".dmg" | head -1)
          echo "ARM: $ARM_FILE, X64: $X64_FILE"
          ARM_SHA=$(shasum -a 512 "out/${ARM_FILE}" | awk '{print $1}' | xxd -r -p | base64)
          X64_SHA=$(shasum -a 512 "out/${X64_FILE}" | awk '{print $1}' | xxd -r -p | base64)
          ARM_SIZE=$(stat -f%z "out/${ARM_FILE}")
          X64_SIZE=$(stat -f%z "out/${X64_FILE}")
          cat > out/latest-mac.yml << EOF
          version: ${VERSION}
          files:
            - url: ${ARM_FILE}
              sha512: ${ARM_SHA}
              size: ${ARM_SIZE}
              blockMapSize: 0
            - url: ${X64_FILE}
              sha512: ${X64_SHA}
              size: ${X64_SIZE}
              blockMapSize: 0
          path: ${ARM_FILE}
          sha512: ${ARM_SHA}
          releaseDate: '$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")'
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            out/**/*.dmg
            out/**/*.yml

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./artifacts

      - name: Download Mac build
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Qrokan Agent ${{ github.ref_name }}
          body: |
            ## Qrokan Agent ${{ github.ref_name }}

            Gelen siparişleri otomatik olarak yazıcınıza gönderir.

            ### Kurulum
            - **Windows:** `Qrokan-Agent-Setup-*.exe` dosyasını indirip çalıştırın
            - **Mac:** `Qrokan-Agent-*.dmg` dosyasını indirip uygulamayı Applications klasörüne sürükleyin

            ### Kullanım
            1. Uygulamayı başlatın (sistem tepsisinde görünür)
            2. Dashboard → Kiosk Ekranı → API Anahtarı oluşturun
            3. Anahtarı uygulamaya girin
            4. Yazıcınızı seçin — hazır!
          files: ./artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
