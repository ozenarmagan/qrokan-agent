<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 24px;
      background: #1a1a1a;
      color: #fff;
      height: 100vh;
    }
    p { font-size: 13px; color: #aaa; margin-bottom: 10px; }
    input {
      width: 100%;
      padding: 10px 12px;
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus { border-color: #7c3aed; }
    button {
      width: 100%;
      padding: 10px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    button:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <p>Qrokan Dashboard → Kiosk Ekranı → Yazıcı Agent bölümünden API anahtarınızı kopyalayın:</p>
  <input id="k" type="text" placeholder="qrk_..." autofocus>
  <button onclick="send()">Bağlan</button>
  <script>
    const { ipcRenderer } = require('electron')
    function send() {
      const k = document.getElementById('k').value.trim()
      if (k) ipcRenderer.send('api-key', k)
    }
    document.getElementById('k').addEventListener('keydown', e => {
      if (e.key === 'Enter') send()
    })
  </script>
</body>
</html>
