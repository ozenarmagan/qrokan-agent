<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 24px;
      background: #1a1a1a;
      color: #fff;
      height: 100vh;
    }
    p { font-size: 13px; color: #aaa; margin-bottom: 10px; }
    select {
      width: 100%;
      padding: 10px 12px;
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      outline: none;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    button:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <p>Yazıcı seçin:</p>
  <select id="p"></select>
  <button onclick="send()">Seç ve Kaydet</button>
  <script>
    const { ipcRenderer } = require('electron')
    // Yazıcı listesini ana process'ten al
    ipcRenderer.on('printers', (_, printers) => {
      const sel = document.getElementById('p')
      printers.forEach((p, i) => {
        const opt = document.createElement('option')
        opt.value = i
        opt.textContent = p.name + (p.type === 'network' ? ' (Ağ)' : ' (USB)')
        sel.appendChild(opt)
      })
    })
    function send() {
      ipcRenderer.send('printer-select', document.getElementById('p').value)
    }
  </script>
</body>
</html>
